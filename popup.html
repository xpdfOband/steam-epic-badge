<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Epic Badge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ============================================================
       头部区域：扩展图标、标题、状态指示
       ============================================================ -->
  <header class="header">
    <div class="header-top">
      <img src="icons/icon48.png" alt="Logo" class="header-icon">
      <div class="header-info">
        <h1 class="header-title">Steam Epic Badge</h1>
        <div class="header-status">
          <span id="statusDot" class="status-dot status-active"></span>
          <span id="statusText" class="status-text">运行中</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ============================================================
       当前免费游戏区域
       ============================================================ -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">
        <span class="section-icon">&#9733;</span>
        Epic 当前免费游戏
      </h2>
      <button id="btnRefresh" class="btn-icon" title="刷新免费游戏数据">
        <span id="refreshIcon" class="refresh-icon">&#8635;</span>
      </button>
    </div>
    <div id="freeGamesList" class="free-games-list">
      <!-- 动态填充：免费游戏卡片 -->
      <div class="loading-placeholder" id="freeGamesLoading">
        <span class="spinner"></span>
        <span>加载中...</span>
      </div>
    </div>
    <div id="freeGamesEmpty" class="empty-hint" style="display:none;">
      暂无免费游戏信息
    </div>
  </section>

  <!-- ============================================================
       数据统计区域
       ============================================================ -->
  <section class="section">
    <h2 class="section-title">
      <span class="section-icon">&#128202;</span>
      数据统计
    </h2>
    <div class="stats-grid">
      <div class="stat-card">
        <span id="statHistory" class="stat-number">--</span>
        <span class="stat-label">历史赠送</span>
      </div>
      <div class="stat-card">
        <span id="statCurrent" class="stat-number">--</span>
        <span class="stat-label">当前免费</span>
      </div>
    </div>
    <div id="lastFetchInfo" class="last-fetch-info">
      上次更新：--
    </div>
  </section>

  <!-- ============================================================
       设置选项
       ============================================================ -->
  <section class="section">
    <h2 class="section-title">
      <span class="section-icon">&#9881;</span>
      设置
    </h2>
    <div class="settings-list">
      <!-- 在 Steam 搜索页启用 -->
      <div class="setting-item">
        <label class="setting-label" for="toggleSearch">搜索结果页</label>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleSearch" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <!-- 在 Steam 首页启用 -->
      <div class="setting-item">
        <label class="setting-label" for="toggleHomepage">首页推荐</label>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleHomepage" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <!-- 在游戏详情页启用 -->
      <div class="setting-item">
        <label class="setting-label" for="toggleDetail">游戏详情页</label>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleDetail" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <!-- 在愿望单页启用 -->
      <div class="setting-item">
        <label class="setting-label" for="toggleWishlist">愿望单</label>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleWishlist" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </section>

  <!-- ============================================================
       底部：版本信息
       ============================================================ -->
  <footer class="footer">
    <span class="footer-version">v1.0.0</span>
    <span class="footer-separator">|</span>
    <span class="footer-text">Steam &times; Epic</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
